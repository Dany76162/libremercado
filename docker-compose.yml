services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: libremercado
      POSTGRES_PASSWORD: libremercado
      POSTGRES_DB: libremercado
    # Puerto distinto del host para no chocar con un Postgres local en :5432
    ports:
      - "5434:5432"
    volumes:
      - libremercado_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libremercado -d libremercado"]
      interval: 3s
      timeout: 5s
      retries: 20

volumes:
  libremercado_pgdata:
